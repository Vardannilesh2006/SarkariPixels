<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!--
    SarkariPixels favicon
    Concept: A photo frame (corner brackets) with a bold "SP"
    monogram inside — readable at 16px, distinctive at 32px.
    Single color: #2563EB (design system accent)
  -->

  <!-- Background: solid rounded square, accent blue -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="#2563EB"/>

  <!-- Photo-frame corner brackets — top-left -->
  <path d="M 96 176 L 96 96 L 176 96"
        stroke="#ffffff" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="1"/>

  <!-- top-right -->
  <path d="M 416 176 L 416 96 L 336 96"
        stroke="#ffffff" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="1"/>

  <!-- bottom-left -->
  <path d="M 96 336 L 96 416 L 176 416"
        stroke="#ffffff" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="1"/>

  <!-- bottom-right -->
  <path d="M 416 336 L 416 416 L 336 416"
        stroke="#ffffff" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="1"/>

  <!--
    SP monogram — two letters as one compact unit
    S: top arc + bottom arc
    P: vertical stroke + top loop
    Drawn as a single clean composition centered at 256,256
  -->

  <!-- "S" — left half, 140–232 x-range -->
  <path d="M 218 180
           C 218 155, 148 155, 148 200
           C 148 240, 220 230, 220 275
           C 220 320, 148 318, 148 295"
        stroke="#ffffff" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- "P" — right half, 242–360 x-range -->
  <!-- vertical bar -->
  <line x1="258" y1="168" x2="258" y2="338"
        stroke="#ffffff" stroke-width="38"
        stroke-linecap="round"/>
  <!-- top loop of P -->
  <path d="M 258 168
           C 258 168, 355 168, 355 215
           C 355 260, 258 258, 258 258"
        stroke="#ffffff" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
